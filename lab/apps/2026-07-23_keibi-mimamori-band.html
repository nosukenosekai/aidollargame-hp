<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>警備みまもりバンド（デモ）</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0;
    --blue: #2563eb;
    --ink: #1a1a1a;
    --sub: #6b7280;
    --line: #e7e5e0;
    --ok: #16a34a;
    --warn: #d97706;
    --danger: #dc2626;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 430px; margin: 0 auto; padding: 0 16px 48px; }
  .demoflag {
    text-align: center;
    font-size: 11px;
    color: var(--sub);
    background: #ecebe6;
    padding: 6px;
    letter-spacing: .04em;
  }
  header { padding: 20px 0 10px; }
  .brand { font-size: 20px; font-weight: 800; letter-spacing: .01em; }
  .brand span { color: var(--blue); }
  .tagline { font-size: 13px; color: var(--sub); margin-top: 2px; }

  .bar {
    display: flex; gap: 8px; margin: 14px 0 6px;
  }
  .stat {
    flex: 1; background: #fff; border: 1px solid var(--line);
    border-radius: 14px; padding: 12px 10px; text-align: center;
  }
  .stat .n { font-size: 22px; font-weight: 800; line-height: 1.1; }
  .stat .l { font-size: 11px; color: var(--sub); margin-top: 2px; }
  .stat.d .n { color: var(--danger); }
  .stat.w .n { color: var(--warn); }
  .stat.o .n { color: var(--ok); }

  .sect { font-size: 12px; color: var(--sub); margin: 20px 4px 8px; font-weight: 600; letter-spacing: .03em; }

  .card {
    background: #fff; border: 1px solid var(--line);
    border-radius: 14px; padding: 14px; margin-bottom: 10px;
    cursor: pointer; transition: transform .06s, box-shadow .12s;
  }
  .card:active { transform: scale(.99); }
  .row { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 42px; height: 42px; border-radius: 12px; flex: 0 0 42px;
    background: #eef2ff; color: var(--blue);
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 15px;
  }
  .who { flex: 1; min-width: 0; }
  .who .nm { font-weight: 700; font-size: 15px; }
  .who .pl { font-size: 12px; color: var(--sub); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pill {
    font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 999px; white-space: nowrap;
  }
  .p-ok { background: #dcfce7; color: #166534; }
  .p-warn { background: #fef3c7; color: #92400e; }
  .p-danger { background: #fee2e2; color: #991b1b; }

  .metrics { display: flex; gap: 8px; margin-top: 12px; }
  .m {
    flex: 1; background: var(--bg); border-radius: 10px; padding: 8px; text-align: center;
  }
  .m .mv { font-weight: 800; font-size: 16px; }
  .m .ml { font-size: 10px; color: var(--sub); }

  /* detail */
  .back { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: var(--blue); font-weight: 600; padding: 14px 0 6px; cursor: pointer; }
  .back::before { content: "‹"; font-size: 20px; line-height: 1; }
  .dhead { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .dhead .row { align-items: flex-start; }
  .dhead .avatar { width: 52px; height: 52px; flex-basis: 52px; font-size: 18px; }
  .banner {
    border-radius: 12px; padding: 12px 14px; margin: 12px 0; font-size: 13px; font-weight: 600;
  }
  .banner.danger { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
  .banner.warn { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
  .banner.ok { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .big {
    background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 14px; text-align: center;
  }
  .big .bv { font-size: 26px; font-weight: 800; line-height: 1.1; }
  .big .bl { font-size: 11px; color: var(--sub); margin-top: 3px; }
  .big .bt { font-size: 11px; margin-top: 4px; font-weight: 700; }
  .up { color: var(--danger); } .down { color: var(--ok); } .flat { color: var(--sub); }

  .log { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 4px 14px; margin-top: 12px; }
  .li { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .li:last-child { border-bottom: none; }
  .li .t { color: var(--sub); flex: 0 0 44px; font-variant-numeric: tabular-nums; }
  .li .dot { flex: 0 0 8px; height: 8px; width: 8px; border-radius: 50%; margin-top: 7px; }
  .dot-d { background: var(--danger); } .dot-w { background: var(--warn); } .dot-o { background: var(--ok); }

  .btn {
    display: block; width: 100%; text-align: center; border: none; cursor: pointer;
    background: var(--blue); color: #fff; font-weight: 700; font-size: 15px;
    padding: 14px; border-radius: 14px; margin-top: 14px;
    font-family: inherit;
  }
  .btn.ghost { background: #fff; color: var(--blue); border: 1px solid #c7d2fe; }
  .btn:active { opacity: .9; }
  .btn:disabled { background: #cbd5e1; cursor: default; }

  .note { font-size: 12px; color: var(--sub); margin-top: 10px; text-align: center; }
  footer { text-align: center; font-size: 11px; color: var(--sub); margin-top: 26px; line-height: 1.7; }
  .hide { display: none; }
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: #111827; color: #fff; font-size: 13px; padding: 11px 18px;
    border-radius: 999px; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none;
    max-width: 90%;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
</style>
</head>
<body>
<div class="demoflag">デモ（サンプルデータ・人物はすべて架空です）</div>
<div class="wrap">
  <header>
    <div class="brand">警備<span>みまもり</span>バンド</div>
    <div class="tagline">隊員のリストバンドが疲労・暑さのサインを検知。倒れる前に本部へ通知します。</div>
  </header>

  <!-- 一覧 -->
  <section id="list">
    <div class="bar">
      <div class="stat o"><div class="n" id="s-ok">0</div><div class="l">正常</div></div>
      <div class="stat w"><div class="n" id="s-warn">0</div><div class="l">注意</div></div>
      <div class="stat d"><div class="n" id="s-dang">0</div><div class="l">要交代</div></div>
    </div>
    <div class="sect">現在の稼働隊員（本日 7/23・最高気温 35度予報）</div>
    <div id="cards"></div>
    <footer>
      ※ 心拍・体表温・活動量はリストバンドが1分ごとに送信（デモでは疑似データ）。<br>
      医療機器ではありません。体調判断の最終責任は現場管理者にあります。
    </footer>
  </section>

  <!-- 詳細 -->
  <section id="detail" class="hide">
    <div class="back" onclick="showList()">一覧にもどる</div>
    <div class="dhead">
      <div class="row">
        <div class="avatar" id="d-av"></div>
        <div class="who">
          <div class="nm" id="d-nm"></div>
          <div class="pl" id="d-pl"></div>
        </div>
        <div class="pill" id="d-pill"></div>
      </div>
      <div class="banner" id="d-banner"></div>
    </div>

    <div class="grid2">
      <div class="big"><div class="bv" id="d-hr"></div><div class="bl">心拍数（拍/分）</div><div class="bt" id="d-hrt"></div></div>
      <div class="big"><div class="bv" id="d-tmp"></div><div class="bl">体表温（度）</div><div class="bt" id="d-tmpt"></div></div>
      <div class="big"><div class="bv" id="d-move"></div><div class="bl">直近30分の動き</div><div class="bt flat">歩数から推定</div></div>
      <div class="big"><div class="bv" id="d-hrs"></div><div class="bl">連続稼働（時間）</div><div class="bt" id="d-hrst"></div></div>
    </div>

    <div class="sect" style="margin-top:16px">みまもりログ</div>
    <div class="log" id="d-log"></div>

    <button class="btn" id="act-btn" onclick="doAction()"></button>
    <button class="btn ghost" onclick="showList()">あとで対応する</button>
    <div class="note" id="d-note"></div>
  </section>
</div>
<div class="toast" id="toast"></div>

<script>
// ===== サンプルデータ（すべて架空） =====
const guards = [
  { id:1, name:"田村 健一", role:"交通誘導・国道沿い現場", init:"田",
    status:"danger", hr:132, hrTrend:"up", tmp:38.2, tmpTrend:"up", move:"ほぼ静止", hrs:6.5, hrsWarn:true,
    reason:"心拍が15分間130超で高止まり、体表温も上昇。炎天下の熱中症サインです。",
    log:[
      {t:"14:20", d:"d", m:"心拍132・体表温38.2度／要交代アラート"},
      {t:"14:05", d:"w", m:"心拍が120を継続・水分補給を促す通知"},
      {t:"13:10", d:"w", m:"連続稼働6時間・休憩リマインド"},
      {t:"08:00", d:"o", m:"稼働開始・平常値"},
    ]},
  { id:2, name:"小野寺 誠", role:"夜勤明け→日勤 施設警備", init:"小",
    status:"warn", hr:98, hrTrend:"flat", tmp:37.1, tmpTrend:"up", move:"少ない", hrs:5.0, hrsWarn:false,
    reason:"体表温がじわり上昇中。動きが減っており、疲労がたまっているサインです。",
    log:[
      {t:"14:12", d:"w", m:"体表温37.1度・注意レベルへ"},
      {t:"12:30", d:"o", m:"昼休憩を取得（記録）"},
      {t:"09:00", d:"o", m:"稼働開始・平常値"},
    ]},
  { id:3, name:"吉川 さやか", role:"イベント会場 入口案内", init:"吉",
    status:"ok", hr:82, hrTrend:"flat", tmp:36.6, tmpTrend:"flat", move:"活発", hrs:2.5, hrsWarn:false,
    reason:"すべて平常範囲です。引き続き1分ごとに見守ります。",
    log:[
      {t:"14:00", d:"o", m:"平常値・こまめに水分補給あり"},
      {t:"11:30", d:"o", m:"稼働開始・平常値"},
    ]},
  { id:4, name:"渡辺 三郎", role:"駐車場 場内整理（68歳）", init:"渡",
    status:"warn", hr:110, hrTrend:"up", tmp:37.4, tmpTrend:"up", move:"少ない", hrs:4.0, hrsWarn:false,
    reason:"高齢の隊員。心拍と体温がゆっくり上がっています。早めの休憩が安全です。",
    log:[
      {t:"14:08", d:"w", m:"心拍110・注意レベルへ"},
      {t:"13:00", d:"o", m:"日陰で小休止（記録）"},
      {t:"10:00", d:"o", m:"稼働開始・平常値"},
    ]},
];

const statusMap = {
  ok:   { label:"正常",   cls:"p-ok" },
  warn: { label:"注意",   cls:"p-warn" },
  danger:{ label:"要交代", cls:"p-danger" },
};
const bannerCls = { ok:"ok", warn:"warn", danger:"danger" };
const dotCls = { o:"dot-o", w:"dot-w", d:"dot-d" };
const trendTxt = { up:"上昇中", down:"低下", flat:"安定" };
const trendCls = { up:"up", down:"down", flat:"flat" };

let current = null;

function renderList(){
  let ok=0,warn=0,dang=0;
  guards.forEach(g=>{ if(g.status==="ok")ok++; else if(g.status==="warn")warn++; else dang++; });
  document.getElementById("s-ok").textContent = ok;
  document.getElementById("s-warn").textContent = warn;
  document.getElementById("s-dang").textContent = dang;

  const order = { danger:0, warn:1, ok:2 };
  const sorted = [...guards].sort((a,b)=>order[a.status]-order[b.status]);
  const html = sorted.map(g=>{
    const s = statusMap[g.status];
    return `<div class="card" onclick="showDetail(${g.id})">
      <div class="row">
        <div class="avatar">${g.init}</div>
        <div class="who"><div class="nm">${g.name}</div><div class="pl">${g.role}</div></div>
        <div class="pill ${s.cls}">${s.label}</div>
      </div>
      <div class="metrics">
        <div class="m"><div class="mv">${g.hr}</div><div class="ml">心拍</div></div>
        <div class="m"><div class="mv">${g.tmp.toFixed(1)}</div><div class="ml">体表温</div></div>
        <div class="m"><div class="mv">${g.hrs.toFixed(1)}h</div><div class="ml">連続稼働</div></div>
      </div>
    </div>`;
  }).join("");
  document.getElementById("cards").innerHTML = html;
}

function showDetail(id){
  const g = guards.find(x=>x.id===id);
  current = g;
  document.getElementById("d-av").textContent = g.init;
  document.getElementById("d-nm").textContent = g.name;
  document.getElementById("d-pl").textContent = g.role;
  const s = statusMap[g.status];
  const pill = document.getElementById("d-pill");
  pill.textContent = s.label; pill.className = "pill " + s.cls;

  const banner = document.getElementById("d-banner");
  banner.className = "banner " + bannerCls[g.status];
  banner.textContent = g.reason;

  document.getElementById("d-hr").textContent = g.hr;
  document.getElementById("d-hrt").textContent = trendTxt[g.hrTrend];
  document.getElementById("d-hrt").className = "bt " + trendCls[g.hrTrend];
  document.getElementById("d-tmp").textContent = g.tmp.toFixed(1);
  document.getElementById("d-tmpt").textContent = trendTxt[g.tmpTrend];
  document.getElementById("d-tmpt").className = "bt " + trendCls[g.tmpTrend];
  document.getElementById("d-move").textContent = g.move;
  document.getElementById("d-hrs").textContent = g.hrs.toFixed(1);
  document.getElementById("d-hrst").textContent = g.hrsWarn ? "長め・要注意" : "適正範囲";
  document.getElementById("d-hrst").className = "bt " + (g.hrsWarn ? "up" : "flat");

  document.getElementById("d-log").innerHTML = g.log.map(l=>
    `<div class="li"><span class="t">${l.t}</span><span class="dot ${dotCls[l.d]}"></span><span>${l.m}</span></div>`
  ).join("");

  const btn = document.getElementById("act-btn");
  const note = document.getElementById("d-note");
  btn.disabled = false;
  if(g.status==="danger"){
    btn.textContent = "近くの隊員に交代を手配する";
    note.textContent = "手配すると本部と本人のバンドに通知が飛びます（デモでは送信しません）。";
  } else if(g.status==="warn"){
    btn.textContent = "10分の休憩と水分補給を指示する";
    note.textContent = "指示内容はログに残り、労務・安全記録として保存されます（デモ）。";
  } else {
    btn.textContent = "この隊員に声かけメモを送る";
    note.textContent = "平常時でも、ねぎらいの声かけを記録できます（デモ）。";
  }

  document.getElementById("list").classList.add("hide");
  document.getElementById("detail").classList.remove("hide");
  window.scrollTo(0,0);
}

function showList(){
  document.getElementById("detail").classList.add("hide");
  document.getElementById("list").classList.remove("hide");
  window.scrollTo(0,0);
}

function doAction(){
  const g = current;
  let msg = "";
  if(g.status==="danger"){ msg = g.name+"さんの交代手配を送信しました（デモ）"; }
  else if(g.status==="warn"){ msg = g.name+"さんへ休憩指示を記録しました（デモ）"; }
  else { msg = g.name+"さんへ声かけメモを記録しました（デモ）"; }
  document.getElementById("act-btn").disabled = true;
  toast(msg);
}

function toast(m){
  const t = document.getElementById("toast");
  t.textContent = m; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

renderList();
</script>
</body>
</html>
