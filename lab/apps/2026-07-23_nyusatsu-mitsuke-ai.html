<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入札みつけAI（デモ）</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --blue: #2563eb; --ink: #1a1a1a; --sub: #6b7280;
    --line: #e7e5e0; --ok: #16a34a; --warn: #d97706; --danger: #dc2626;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.7; -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 430px; margin: 0 auto; padding: 0 16px 48px; }
  .demoflag {
    text-align: center; font-size: 11px; color: var(--sub);
    background: #ecebe6; padding: 6px; letter-spacing: .04em;
  }
  header { padding: 20px 0 6px; }
  .brand { font-size: 21px; font-weight: 800; }
  .brand span { color: var(--blue); }
  .tagline { font-size: 13px; color: var(--sub); margin-top: 4px; }

  /* filters */
  .filters { display: flex; gap: 8px; margin: 16px 0 6px; }
  .fg { flex: 1; }
  .fg label { font-size: 11px; color: var(--sub); font-weight: 600; display: block; margin-bottom: 4px; }
  select {
    width: 100%; font-family: inherit; font-size: 14px; padding: 10px 12px;
    border: 1.5px solid var(--line); border-radius: 12px; background: #fff; color: var(--ink);
    -webkit-appearance: none; appearance: none;
  }
  select:focus { outline: none; border-color: #c7d2fe; }
  .countbar { font-size: 12px; color: var(--sub); margin: 6px 2px 4px; }

  .card {
    background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 15px; margin-bottom: 10px;
    cursor: pointer; transition: transform .06s;
  }
  .card:active { transform: scale(.99); }
  .toprow { display: flex; align-items: flex-start; gap: 8px; }
  .cat {
    font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px; white-space: nowrap;
    background: #eef2ff; color: var(--blue);
  }
  .deadline { font-size: 11px; font-weight: 700; margin-left: auto; white-space: nowrap; }
  .dl-soon { color: var(--danger); } .dl-mid { color: var(--warn); } .dl-far { color: var(--sub); }
  .ctitle { font-weight: 700; font-size: 15px; margin: 8px 0 2px; }
  .cmeta { font-size: 12px; color: var(--sub); }
  .fitrow { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .fitbar { flex: 1; height: 7px; border-radius: 999px; background: #eceae4; overflow: hidden; }
  .fitbar i { display: block; height: 100%; border-radius: 999px; }
  .fit-h { background: var(--ok); } .fit-m { background: var(--warn); } .fit-l { background: #cbd5e1; }
  .fitlabel { font-size: 11px; font-weight: 700; white-space: nowrap; }
  .fh { color: var(--ok); } .fm { color: var(--warn); } .fl { color: var(--sub); }

  /* detail */
  .back { display: inline-flex; align-items: center; gap: 6px; font-size: 14px; color: var(--blue); font-weight: 600; padding: 14px 0 4px; cursor: pointer; }
  .back::before { content: "‹"; font-size: 20px; line-height: 1; }
  .dcard { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 18px; }
  .dtitle { font-size: 18px; font-weight: 800; }
  .dsub { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .drow { display: flex; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .drow:last-child { border: none; }
  .drow .k { flex: 0 0 96px; color: var(--sub); font-size: 13px; }
  .drow .v { flex: 1; }
  .amount { font-weight: 800; }
  .aihint {
    background: #f0f7ff; border: 1px solid #cfe0fb; border-radius: 12px; padding: 12px 14px; margin-top: 14px; font-size: 13px;
  }
  .aihint .h { font-weight: 700; color: var(--blue); font-size: 12px; margin-bottom: 4px; letter-spacing: .03em; }
  .disc { font-size: 11px; color: var(--sub); margin-top: 12px; }

  .btn {
    display: block; width: 100%; text-align: center; border: none; cursor: pointer;
    background: var(--blue); color: #fff; font-weight: 700; font-size: 15px;
    padding: 15px; border-radius: 14px; margin-top: 12px; font-family: inherit;
  }
  .btn.ghost { background: #fff; color: var(--blue); border: 1.5px solid #c7d2fe; }
  .btn:active { opacity: .9; }
  .btn.saved { background: #eaf7ee; color: var(--ok); border: 1.5px solid #bbe6c8; }

  .empty { text-align: center; color: var(--sub); font-size: 13px; padding: 30px 10px; }
  .toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: #111827; color: #fff; font-size: 13px; padding: 11px 18px;
    border-radius: 999px; opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 40; max-width: 90%;
  }
  .toast.show { opacity: 1; }
  footer { text-align: center; font-size: 11px; color: var(--sub); margin-top: 24px; line-height: 1.7; }
  .hide { display: none; }
</style>
</head>
<body>
<div class="demoflag">デモ（サンプルデータ・自治体名/案件はすべて架空です）</div>
<div class="wrap">
  <header>
    <div class="brand">入札<span>みつけ</span>AI</div>
    <div class="tagline">全国の官公庁・自治体の入札公告を、あなたの業種とエリアだけに絞って毎朝お届け。取りこぼしをなくします。</div>
  </header>

  <!-- 一覧 -->
  <section id="s-list">
    <div class="filters">
      <div class="fg">
        <label>業種</label>
        <select id="f-cat" onchange="renderList()">
          <option value="">すべて</option>
          <option value="建設・土木">建設・土木</option>
          <option value="電気・設備">電気・設備</option>
          <option value="清掃・管理">清掃・管理</option>
          <option value="印刷・広報">印刷・広報</option>
          <option value="IT・システム">IT・システム</option>
        </select>
      </div>
      <div class="fg">
        <label>エリア</label>
        <select id="f-area" onchange="renderList()">
          <option value="">全国</option>
          <option value="関東">関東</option>
          <option value="中部">中部</option>
          <option value="近畿">近畿</option>
          <option value="九州">九州</option>
        </select>
      </div>
    </div>
    <div class="countbar" id="countbar"></div>
    <div id="list"></div>
    <footer>
      入札公告は各機関が公開する情報をもとにしています（デモは架空データ）。予定価格・落札額の目安はあくまで参考値で、落札や受注を保証するものではありません。
    </footer>
  </section>

  <!-- 詳細 -->
  <section id="s-detail" class="hide">
    <div class="back" onclick="go('s-list')">一覧にもどる</div>
    <div class="dcard">
      <div class="cat" id="d-cat" style="display:inline-block"></div>
      <div class="dtitle" id="d-title" style="margin-top:8px"></div>
      <div class="dsub" id="d-sub"></div>
      <div style="margin-top:12px">
        <div class="drow"><div class="k">発注機関</div><div class="v" id="d-org"></div></div>
        <div class="drow"><div class="k">入札方式</div><div class="v" id="d-method"></div></div>
        <div class="drow"><div class="k">予定価格の目安</div><div class="v amount" id="d-price"></div></div>
        <div class="drow"><div class="k">参加資格</div><div class="v" id="d-qual"></div></div>
        <div class="drow"><div class="k">必要書類</div><div class="v" id="d-docs"></div></div>
        <div class="drow"><div class="k">申込締切</div><div class="v" id="d-due"></div></div>
      </div>
      <div class="aihint">
        <div class="h">AIメモ（参考）</div>
        <div id="d-ai"></div>
      </div>
      <div class="disc" id="d-disc"></div>
    </div>
    <button class="btn" id="save-btn" onclick="toggleSave()"></button>
    <button class="btn ghost" onclick="notifyReg()">この条件の新着を毎朝通知する</button>
  </section>
</div>
<div class="toast" id="toast"></div>

<script>
// ===== サンプル入札案件（すべて架空の自治体・機関） =====
const bids = [
  { id:1, cat:"清掃・管理", area:"関東", title:"みなと市 市民体育館ほか2施設 定期清掃業務委託",
    org:"みなと市 施設管理課", method:"一般競争入札（最低価格）", price:"予定価格 約480万円／年",
    qual:"みなと市 入札参加資格 建物清掃 A〜C等級", docs:"入札書、資格証明、直近の同種業務実績1件",
    due:"7月28日（月）17時", dueType:"soon",
    ai:"過去2年の同種案件は 約430〜510万円で落札。3社前後の競争が中心で、実績があれば十分に狙える規模です。",
    fit:"high" },
  { id:2, cat:"電気・設備", area:"中部", title:"あおば町 町立小学校 空調更新工事",
    org:"あおば町 教育総務課", method:"指名競争入札", price:"予定価格 約2,300万円",
    qual:"電気工事業 特定建設業許可、町内または近隣に営業所", docs:"入札書、建設業許可写し、施工体制の概要",
    due:"8月5日（火）正午", dueType:"mid",
    ai:"金額規模が大きく、特定建設業許可と近隣営業所が条件。要件を満たす会社は限られ、該当すれば受注確度は高めです。",
    fit:"mid" },
  { id:3, cat:"印刷・広報", area:"関東", title:"さくら県 観光パンフレット 企画・印刷一式",
    org:"さくら県 観光振興局", method:"公募型プロポーザル", price:"上限 約350万円",
    qual:"印刷業、企画提案の実績（自治体・観光分野が望ましい）", docs:"企画提案書、見積書、会社概要、実績3件",
    due:"8月12日（火）17時", dueType:"far",
    ai:"価格でなく企画提案で決まる方式。デザイン力と観光分野の実績が響きます。価格勝負が苦手でも取りにいけるタイプ。",
    fit:"high" },
  { id:4, cat:"IT・システム", area:"近畿", title:"ひなた市 図書館システム 保守・運用業務",
    org:"ひなた市 情報政策課", method:"一般競争入札（総合評価）", price:"予定価格 約620万円／年",
    qual:"情報処理関連、同種システムの保守実績", docs:"入札書、技術提案書、資格証明、実績2件",
    due:"8月8日（金）17時", dueType:"mid",
    ai:"総合評価方式で価格と技術点の両方を見られます。現行ベンダーが有利になりがちな領域のため、乗り換え提案の工夫が必要です。",
    fit:"low" },
  { id:5, cat:"建設・土木", area:"九州", title:"みどり町 町道01号線 舗装補修工事",
    org:"みどり町 建設課", method:"一般競争入札（最低価格）", price:"予定価格 約1,800万円",
    qual:"土木一式工事 一般建設業許可、町内に本店または支店", docs:"入札書、建設業許可写し、配置技術者の資格",
    due:"7月30日（水）正午", dueType:"soon",
    ai:"地元要件（町内本支店）がある地域限定案件。近隣の同業が数社の競争になりやすく、地元事業者に有利です。",
    fit:"mid" },
  { id:6, cat:"清掃・管理", area:"近畿", title:"うみかぜ市 庁舎 常駐警備・受付業務委託",
    org:"うみかぜ市 総務課", method:"公募型プロポーザル", price:"上限 約1,200万円／年",
    qual:"警備業認定、庁舎等の常駐警備実績", docs:"提案書、警備業認定証、実績2件、配置計画",
    due:"8月18日（火）17時", dueType:"far",
    ai:"人員配置と教育体制の提案が評価の中心。単価の安さより体制の安定性で選ばれる傾向です。",
    fit:"mid" },
];

const dlText = { soon:"締切ちかい", mid:"締切 約2週間", far:"締切 先" };
const dlCls  = { soon:"dl-soon", mid:"dl-mid", far:"dl-far" };
const fitText = { high:"狙い目", mid:"検討", low:"難しめ" };
const fitBarCls = { high:"fit-h", mid:"fit-m", low:"fit-l" };
const fitLabCls = { high:"fh", mid:"fm", low:"fl" };
const fitW = { high:"85%", mid:"55%", low:"25%" };

let saved = new Set();
let current = null;

function renderList(){
  const cat = document.getElementById("f-cat").value;
  const area = document.getElementById("f-area").value;
  const rows = bids.filter(b => (!cat || b.cat===cat) && (!area || b.area===area));
  // 締切ちかい順
  const ord = { soon:0, mid:1, far:2 };
  rows.sort((a,b)=>ord[a.dueType]-ord[b.dueType]);
  document.getElementById("countbar").textContent =
    `該当 ${rows.length} 件${cat||area ? "（絞り込み中）" : "（全国・全業種）"}`;
  const el = document.getElementById("list");
  if(rows.length===0){ el.innerHTML = `<div class="empty">条件に合う入札はありません。<br>エリアや業種を広げてみてください。</div>`; return; }
  el.innerHTML = rows.map(b=>`
    <div class="card" onclick="openDetail(${b.id})">
      <div class="toprow">
        <span class="cat">${b.cat}</span>
        <span class="deadline ${dlCls[b.dueType]}">${dlText[b.dueType]}</span>
      </div>
      <div class="ctitle">${b.title}</div>
      <div class="cmeta">${b.org}・${b.area}／${b.price}</div>
      <div class="fitrow">
        <div class="fitbar"><i class="${fitBarCls[b.fit]}" style="width:${fitW[b.fit]}"></i></div>
        <span class="fitlabel ${fitLabCls[b.fit]}">AI判定：${fitText[b.fit]}</span>
      </div>
    </div>`).join("");
}

function openDetail(id){
  const b = bids.find(x=>x.id===id);
  current = b;
  document.getElementById("d-cat").textContent = b.cat;
  document.getElementById("d-title").textContent = b.title;
  document.getElementById("d-sub").textContent = `${b.area}／申込締切 ${b.due}`;
  document.getElementById("d-org").textContent = b.org;
  document.getElementById("d-method").textContent = b.method;
  document.getElementById("d-price").textContent = b.price;
  document.getElementById("d-qual").textContent = b.qual;
  document.getElementById("d-docs").textContent = b.docs;
  document.getElementById("d-due").textContent = b.due;
  document.getElementById("d-ai").textContent = b.ai;
  document.getElementById("d-disc").textContent = "※ 予定価格・落札額の目安は公開情報からの推定です。正式な条件・金額は必ず発注機関の公告原文でご確認ください。";
  updateSaveBtn();
  go("s-detail");
}

function toggleSave(){
  if(saved.has(current.id)){ saved.delete(current.id); toast("気になるリストから外しました"); }
  else { saved.add(current.id); toast("気になるリストに保存しました（デモ）"); }
  updateSaveBtn();
}
function updateSaveBtn(){
  const btn = document.getElementById("save-btn");
  if(saved.has(current.id)){ btn.textContent = "気になる 保存済み"; btn.className = "btn saved"; }
  else { btn.textContent = "この入札を「気になる」に保存"; btn.className = "btn"; }
}
function notifyReg(){
  const cat = document.getElementById("f-cat").value || "全業種";
  const area = document.getElementById("f-area").value || "全国";
  toast(`「${area}／${cat}」の新着を毎朝通知に登録しました（デモ・実送信なし）`);
}

function go(id){
  ["s-list","s-detail"].forEach(x=>document.getElementById(x).classList.add("hide"));
  document.getElementById(id).classList.remove("hide");
  window.scrollTo(0,0);
}
function toast(m){
  const el = document.getElementById("toast");
  el.textContent = m; el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), 2400);
}

renderList();
</script>
</body>
</html>
