<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>産廃コストくらべAI（デモ）</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0;
    --blue: #2563eb;
    --blue-d: #1d4ed8;
    --ink: #1a1a1a;
    --sub: #6b7280;
    --line: #e6e4de;
    --card: #ffffff;
    --hi: #dc2626;
    --ok: #16a34a;
    --mid: #d97706;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 560px; margin: 0 auto; padding: 0 16px 48px; }
  .demo-flag {
    background: #ecebe6;
    color: var(--sub);
    font-size: 11px;
    text-align: center;
    padding: 6px;
    letter-spacing: .04em;
  }
  header { padding: 22px 16px 8px; max-width: 560px; margin: 0 auto; }
  h1 { font-size: 21px; font-weight: 800; letter-spacing: -.01em; }
  .lead { font-size: 13px; color: var(--sub); margin-top: 6px; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
    margin-top: 14px;
  }
  label.fld { display: block; font-size: 12px; font-weight: 700; color: var(--sub); margin: 12px 0 6px; }
  label.fld:first-child { margin-top: 0; }
  select, input[type=number] {
    width: 100%;
    font-size: 15px;
    padding: 11px 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fbfbf9;
    color: var(--ink);
    font-family: inherit;
  }
  .row2 { display: flex; gap: 10px; }
  .row2 > div { flex: 1; }
  button.go {
    width: 100%;
    margin-top: 16px;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  button.go:active { background: var(--blue-d); }
  .sec-title { font-size: 13px; font-weight: 800; margin: 22px 4px 2px; }
  .sec-sub { font-size: 12px; color: var(--sub); margin: 0 4px 4px; }
  .vendor {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px 16px;
    margin-top: 12px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .vendor:active { border-color: var(--blue); }
  .v-top { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .v-name { font-size: 15px; font-weight: 700; }
  .v-meta { font-size: 12px; color: var(--sub); margin-top: 3px; }
  .price { font-size: 17px; font-weight: 800; white-space: nowrap; }
  .price small { font-size: 11px; font-weight: 600; color: var(--sub); }
  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    margin-top: 8px;
  }
  .tag.hi { background: #fdeaea; color: var(--hi); }
  .tag.ok { background: #e7f6ec; color: var(--ok); }
  .tag.mid { background: #fdf1e0; color: var(--mid); }
  .items-tag { font-size: 11px; color: var(--sub); margin-top: 6px; }
  .back { color: var(--blue); font-size: 13px; font-weight: 700; cursor: pointer; display: inline-block; margin: 4px 0 2px; }
  .kv { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .kv:last-child { border-bottom: none; }
  .kv .k { color: var(--sub); }
  .kv .v { font-weight: 700; }
  .gauge { height: 8px; background: #edece7; border-radius: 999px; margin: 10px 0 4px; position: relative; }
  .gauge > i { position: absolute; top: -3px; width: 3px; height: 14px; background: var(--ink); border-radius: 2px; }
  .gauge-lbl { display: flex; justify-content: space-between; font-size: 11px; color: var(--sub); }
  .verdict { border-radius: 12px; padding: 12px 14px; margin-top: 4px; font-size: 13px; font-weight: 600; }
  .verdict.hi { background: #fdeaea; color: #991b1b; }
  .verdict.ok { background: #e7f6ec; color: #14532d; }
  .verdict.mid { background: #fdf1e0; color: #7c2d12; }
  .memo { font-size: 12px; color: var(--sub); margin-top: 10px; }
  .foot { font-size: 11px; color: var(--sub); margin-top: 26px; text-align: center; line-height: 1.7; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="demo-flag">デモ（サンプルデータ・架空の業者名）</div>
<header>
  <h1>産廃コストくらべAI</h1>
  <p class="lead">出す廃棄物の品目・量・エリアを入れるだけ。許可業者の相場帯を横断で並べ、今の処分費が高いか安いかをAIが判定します。</p>
</header>

<div class="wrap">

  <!-- 検索画面 -->
  <div id="search" class="card">
    <label class="fld">廃棄物の品目</label>
    <select id="item">
      <option value="haipura">廃プラスチック</option>
      <option value="kikuzu">木くず</option>
      <option value="kongou">混合廃棄物（がれき混じり）</option>
      <option value="kinzoku">金属くず</option>
      <option value="shokzan">食品残さ（生ごみ）</option>
    </select>

    <div class="row2">
      <div>
        <label class="fld">月あたりの量（トン）</label>
        <input type="number" id="tons" value="4" min="1" max="200">
      </div>
      <div>
        <label class="fld">エリア</label>
        <select id="area">
          <option>東京・多摩</option>
          <option>神奈川・川崎</option>
          <option>埼玉・さいたま</option>
          <option>千葉・船橋</option>
        </select>
      </div>
    </div>

    <label class="fld">今の契約単価（円／kg・分かれば）</label>
    <input type="number" id="cur" value="42" min="0" max="500">

    <button class="go" onclick="runSearch()">相場を調べる</button>
  </div>

  <!-- 一覧画面 -->
  <div id="list" class="hidden">
    <div class="back" onclick="toSearch()">← 条件を変える</div>
    <div class="sec-title" id="list-head"></div>
    <div class="sec-sub" id="list-sub"></div>
    <div id="vendors"></div>
    <div class="foot">相場帯は公開されている産廃処理業者の許可情報・料金目安をもとにAIが推計したイメージです。実際の料金は品目の状態・運搬距離・契約条件で変わります。</div>
  </div>

  <!-- 詳細画面 -->
  <div id="detail" class="hidden">
    <div class="back" onclick="toList()">← 一覧に戻る</div>
    <div class="card" id="detail-body"></div>
    <div class="foot">許可番号・料金は架空のサンプルです。実運用では自治体の産廃業者許可データと連携して表示します。</div>
  </div>

</div>

<script>
  // ---- サンプルデータ（架空の業者・料金） ----
  var ITEM_LABEL = {
    haipura: "廃プラスチック", kikuzu: "木くず",
    kongou: "混合廃棄物（がれき混じり）", kinzoku: "金属くず", shokzan: "食品残さ（生ごみ）"
  };
  // 品目ごとの相場帯（円/kg）: 安値〜高値
  var RANGE = {
    haipura: [28, 55], kikuzu: [18, 38], kongou: [45, 90],
    kinzoku: [-15, 8], shokzan: [22, 48]
  };
  // 業者マスタ（架空）
  var VENDORS = [
    { name: "みどり環境サービス", area: "東京・多摩", km: 6,  perkg: 34, license: "第01300xxxxxx号",
      items: ["haipura","kikuzu","kongou"], note: "少量・スポット回収に強い。パレット単位の追加料金なし。" },
    { name: "多摩リサイクルセンター", area: "東京・多摩", km: 11, perkg: 47, license: "第01300yyyyyy号",
      items: ["haipura","kongou","shokzan"], note: "定期回収の空き枠が少なく、繁忙期は割増になりやすい。" },
    { name: "あおぞら産業", area: "神奈川・川崎", km: 18, perkg: 29, license: "第14200zzzzzz号",
      items: ["haipura","kinzoku","kikuzu"], note: "廃プラの材料再生ルートを持ち単価が低め。搬入は要予約。" },
    { name: "さいたま資源開発", area: "埼玉・さいたま", km: 22, perkg: 52, license: "第11200aaaaaa号",
      items: ["kongou","kikuzu"], note: "がれき混じりの混合物に対応。分別が甘いと割増。" },
    { name: "エコネット船橋", area: "千葉・船橋", km: 27, perkg: 38, license: "第12200bbbbbb号",
      items: ["haipura","shokzan","kikuzu"], note: "食品残さの堆肥化に対応。回収頻度を選べる。" }
  ];

  var state = { item: "haipura", tons: 4, area: "東京・多摩", cur: 42, results: [] };

  function yen(n){ return n.toLocaleString("ja-JP"); }
  function man(n){ // 円→万円表記（小数1桁）
    return (n/10000).toFixed(1).replace(/\.0$/,"") + "万円";
  }

  function runSearch(){
    state.item = document.getElementById("item").value;
    state.tons = Math.max(1, parseFloat(document.getElementById("tons").value) || 1);
    state.area = document.getElementById("area").value;
    state.cur  = parseFloat(document.getElementById("cur").value) || 0;

    // 対応業者を抽出し、近い順＋対応品目を優先
    var list = VENDORS.filter(function(v){ return v.items.indexOf(state.item) >= 0; });
    // 同エリアを上に、あとは距離順
    list.sort(function(a,b){
      var sa = (a.area === state.area ? 0 : 1000) + a.km;
      var sb = (b.area === state.area ? 0 : 1000) + b.km;
      return sa - sb;
    });
    state.results = list;
    render();
  }

  function verdictOf(perkg){
    var r = RANGE[state.item];
    var lo = r[0], hi = r[1];
    if (perkg <= lo + (hi-lo)*0.34) return {cls:"ok", txt:"相場より安い"};
    if (perkg >= lo + (hi-lo)*0.67) return {cls:"hi", txt:"相場より高い"};
    return {cls:"mid", txt:"相場並み"};
  }

  function render(){
    var r = RANGE[state.item];
    document.getElementById("list-head").textContent =
      ITEM_LABEL[state.item] + "・月" + state.tons + "トン／" + state.area;
    document.getElementById("list-sub").textContent =
      "相場帯 " + r[0] + "〜" + r[1] + "円/kg　対応業者 " + state.results.length + "社";

    var box = document.getElementById("vendors");
    box.innerHTML = "";
    state.results.forEach(function(v, i){
      var v2 = verdictOf(v.perkg);
      var monthly = v.perkg * state.tons * 1000; // 円/月
      var itemsTxt = v.items.map(function(k){ return ITEM_LABEL[k]; }).join("・");
      var el = document.createElement("div");
      el.className = "vendor";
      el.onclick = (function(idx){ return function(){ toDetail(idx); }; })(i);
      el.innerHTML =
        '<div class="v-top">' +
          '<div><div class="v-name">' + v.name + '</div>' +
          '<div class="v-meta">' + v.area + '　約' + v.km + 'km</div></div>' +
          '<div class="price">' + v.perkg + '<small>円/kg</small></div>' +
        '</div>' +
        '<span class="tag ' + v2.cls + '">' + v2.txt + '</span>' +
        '<div class="items-tag">月あたり目安 ' + man(monthly) + '　対応: ' + itemsTxt + '</div>';
      box.appendChild(el);
    });

    show("list");
  }

  function toDetail(idx){
    var v = state.results[idx];
    var r = RANGE[state.item];
    var v2 = verdictOf(v.perkg);
    var monthly = v.perkg * state.tons * 1000;
    var curMonthly = state.cur * state.tons * 1000;
    var pos = Math.max(0, Math.min(1, (v.perkg - r[0]) / (r[1] - r[0]))) * 100;

    var diffHtml = "";
    if (state.cur > 0){
      var diff = curMonthly - monthly;
      if (diff > 0){
        diffHtml = '<div class="verdict ' + v2.cls + '">今の契約（' + state.cur + '円/kg＝月' + man(curMonthly) +
          '）と比べ、この業者なら月' + man(Math.abs(diff)) + 'の削減余地があります。</div>';
      } else if (diff < 0){
        diffHtml = '<div class="verdict ok">今の契約（' + state.cur + '円/kg）はこの業者より安く、良い条件で契約できています。</div>';
      } else {
        diffHtml = '<div class="verdict mid">今の契約とほぼ同額です。</div>';
      }
    }

    document.getElementById("detail-body").innerHTML =
      '<div class="v-name" style="font-size:18px">' + v.name + '</div>' +
      '<div class="v-meta" style="margin-bottom:12px">許可番号 ' + v.license + '（サンプル）</div>' +

      '<div class="kv"><span class="k">品目</span><span class="v">' + ITEM_LABEL[state.item] + '</span></div>' +
      '<div class="kv"><span class="k">処理単価</span><span class="v">' + v.perkg + '円/kg</span></div>' +
      '<div class="kv"><span class="k">月あたり（' + state.tons + 't）</span><span class="v">' + man(monthly) + '</span></div>' +
      '<div class="kv"><span class="k">運搬距離の目安</span><span class="v">約' + v.km + 'km</span></div>' +

      '<div style="margin-top:16px">' +
        '<div class="gauge"><i style="left:' + pos + '%"></i></div>' +
        '<div class="gauge-lbl"><span>安 ' + r[0] + '円</span><span>相場位置</span><span>高 ' + r[1] + '円</span></div>' +
      '</div>' +

      '<div style="margin-top:14px"></div>' +
      '<div class="verdict ' + v2.cls + '">この単価は<b>' + v2.txt + '</b>ゾーンです。</div>' +
      diffHtml +
      '<div class="memo">見直しメモ：' + v.note + '</div>';

    show("detail");
  }

  function toSearch(){ show("search"); }
  function toList(){ show("list"); }

  function show(id){
    ["search","list","detail"].forEach(function(s){
      document.getElementById(s).classList.toggle("hidden", s !== id);
    });
    window.scrollTo(0,0);
  }
</script>
</body>
</html>
