<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTICLE_TITLE | AIdollargame</title>
<meta name="description" content="ARTICLE_DESC">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan:#00d8ff; --blue:#1a6dff; --accent:#ff5757;
    --dark:#0a1238; --dark2:#121a4a;
    --text:#eef3ff; --muted:#9aa8d0;
    --grad: linear-gradient(135deg,#00d8ff,#1a6dff);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; background:#0a1238; }
  body { background:linear-gradient(180deg,#0a1238 0%,#0c1542 50%,#0a1340 100%); color:var(--text); font-family:'Noto Sans JP',sans-serif; overflow-x:hidden; line-height:1.8; }

  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:1.2rem 3rem; background:rgba(6,9,26,0.88); backdrop-filter:blur(20px); border-bottom:1px solid rgba(0,245,255,0.1); }
  .logo { font-family:'Rajdhani',sans-serif; font-size:1.4rem; font-weight:700; color:white; text-decoration:none; }
  .logo .ai { color:var(--cyan); text-shadow:0 0 20px rgba(0,245,255,0.6); }
  .nav-back { font-family:'Share Tech Mono',monospace; font-size:0.78rem; letter-spacing:0.12em; color:var(--muted); text-decoration:none; transition:color 0.3s; }
  .nav-back:hover { color:var(--cyan); }

  .article-hero { padding:9rem 2rem 5rem; max-width:800px; margin:0 auto; }
  .article-tag { font-family:'Share Tech Mono',monospace; font-size:0.7rem; letter-spacing:0.4em; color:var(--cyan); margin-bottom:1.2rem; display:flex; align-items:center; gap:0.8rem; }
  .article-tag::before { content:''; display:inline-block; width:30px; height:1px; background:var(--cyan); }
  .article-title { font-size:clamp(1.8rem,4vw,2.8rem); font-weight:900; line-height:1.25; margin-bottom:1.5rem; }
  .article-meta { display:flex; gap:2rem; align-items:center; font-family:'Share Tech Mono',monospace; font-size:0.72rem; color:var(--muted); letter-spacing:0.1em; padding-bottom:2rem; border-bottom:1px solid rgba(255,255,255,0.08); }

  .article-body { max-width:800px; margin:0 auto; padding:3rem 2rem 6rem; }
  .article-body h2 { font-size:1.4rem; font-weight:900; margin:3.5rem 0 1.2rem; line-height:1.4; padding-left:1rem; border-left:3px solid var(--cyan); }
  .article-body h3 { font-size:1.1rem; font-weight:700; margin:2.5rem 0 0.8rem; color:#fff; }
  .article-body p { font-size:0.97rem; color:rgba(238,243,255,0.85); line-height:2.1; margin-bottom:1.4rem; }
  .article-body strong { color:#fff; font-weight:700; }
  .article-body ul, .article-body ol { padding-left:1.5rem; margin-bottom:1.4rem; }
  .article-body li { font-size:0.95rem; color:rgba(238,243,255,0.85); line-height:2; margin-bottom:0.4rem; }
  .article-body blockquote { border-left:3px solid var(--accent); padding:1.2rem 1.5rem; margin:2rem 0; background:rgba(255,87,87,0.06); border-radius:0 6px 6px 0; }
  .article-body blockquote p { margin-bottom:0; font-style:italic; color:var(--text); }
  .highlight-box { background:linear-gradient(180deg,rgba(28,38,80,0.9),rgba(16,24,60,0.95)); border:1px solid rgba(0,216,255,0.2); border-radius:10px; padding:2rem 2.5rem; margin:2.5rem 0; }
  .highlight-box h4 { font-family:'Share Tech Mono',monospace; font-size:0.72rem; letter-spacing:0.25em; color:var(--cyan); margin-bottom:0.8rem; }
  .highlight-box p { margin-bottom:0; font-size:0.92rem; }

  .article-cta { background:linear-gradient(180deg,rgba(28,38,80,0.9),rgba(16,24,60,0.95)); border:1px solid rgba(0,216,255,0.2); border-radius:10px; padding:3rem; margin:4rem 0 0; text-align:center; }
  .article-cta h3 { font-size:1.3rem; font-weight:900; margin-bottom:0.8rem; }
  .article-cta p { color:var(--muted); font-size:0.9rem; margin-bottom:2rem; }
  .btn-cta { display:inline-flex; align-items:center; gap:0.6rem; padding:0.9rem 2rem; color:#001428; font-weight:700; font-size:0.9rem; border-radius:8px; background:linear-gradient(110deg,#00d8ff 0%,#1a6dff 50%,#00d8ff 100%); background-size:220% 100%; text-decoration:none; transition:transform 0.25s, box-shadow 0.4s; }
  .btn-cta:hover { transform:translateY(-2px); box-shadow:0 14px 36px -8px rgba(0,216,255,0.6); }

  .related { max-width:800px; margin:0 auto; padding:0 2rem 6rem; }
  .related h3 { font-family:'Share Tech Mono',monospace; font-size:0.72rem; letter-spacing:0.3em; color:var(--muted); margin-bottom:1.5rem; }
  .related-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1rem; }
  .related-card { background:linear-gradient(180deg,rgba(28,38,80,0.9),rgba(16,24,60,0.95)); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:1.4rem; text-decoration:none; color:inherit; transition:all 0.3s; display:block; }
  .related-card:hover { border-color:rgba(0,216,255,0.35); transform:translateY(-4px); }
  .related-card .rc-tag { font-family:'Share Tech Mono',monospace; font-size:0.65rem; color:var(--cyan); margin-bottom:0.5rem; }
  .related-card .rc-title { font-size:0.88rem; font-weight:700; line-height:1.5; }

  footer { border-top:1px solid rgba(255,255,255,0.08); padding:2.5rem 3rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; background:rgba(6,9,26,0.6); }
  .footer-copy { font-size:0.75rem; color:var(--muted); font-family:'Share Tech Mono',monospace; }

  @media(max-width:768px) {
    nav { padding:1rem 1.2rem; }
    .article-hero, .article-body, .related { padding-left:1.2rem; padding-right:1.2rem; }
    footer { padding:2rem 1.5rem; }
  }
</style>
</head>
<body>

<footer>

</html>
